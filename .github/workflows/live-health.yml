name: Live Health Check
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Routes return 200
        run: |
          set -e
          for p in / /info /hours /ladies /faq /contact; do
            S=$(curl -sI -o /dev/null -w '%{http_code}' "https://one1-3md.pages.dev${p}")
            [ "$S" = "200" ] || { echo "FAIL $p $S"; exit 1; }
            echo "OK $p $S"
          done
      - name: Static assets return 200
        run: |
          set -e
          for f in /sitemap.xml /robots.txt /llms.txt /site.webmanifest /sw.js /og/og-thumb.png /icons/icon-192.png /icons/icon-512.png; do
            S=$(curl -sI -o /dev/null -w '%{http_code}' "https://one1-3md.pages.dev${f}")
            [ "$S" = "200" ] || { echo "FAIL $f $S"; exit 1; }
            echo "OK $f $S"
          done
